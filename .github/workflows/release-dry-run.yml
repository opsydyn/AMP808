name: Release dry run

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: Enable verbose release-plz logging
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release-dry-run:
    name: release-plz dry run
    if: ${{ github.repository_owner == 'opsydyn' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz release dry run
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
          dry_run: true
          verbose: ${{ inputs.verbose }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize dry run
        shell: bash
        env:
          RELEASES_CREATED: ${{ steps.release-plz.outputs.releases_created }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          echo "releases_created=${RELEASES_CREATED}"
          if [[ "${RELEASES_CREATED}" == "true" ]]; then
            echo "${RELEASES}" | python3 -m json.tool
          else
            echo "No release would be created from the selected ref."
          fi

      - name: Write workflow summary
        shell: bash
        env:
          RELEASES_CREATED: ${{ steps.release-plz.outputs.releases_created }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          {
            echo "## release-plz dry run"
            echo
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Would create release: \`${RELEASES_CREATED}\`"
            echo
            if [[ "${RELEASES_CREATED}" == "true" ]]; then
              echo "| Package | Version | Tag |"
              echo "| --- | --- | --- |"
              python3 -c 'import json, os; [print("\t".join((r["package_name"], r["version"], r["tag"]))) for r in json.loads(os.environ["RELEASES"])]' |
                while IFS=$'\t' read -r package version tag; do
                  echo "| \`${package}\` | \`${version}\` | \`${tag}\` |"
                done
            else
              echo "No release would be created from the selected ref."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
