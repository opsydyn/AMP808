name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'demo-images/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to build and upload assets for
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  APP_NAME: amp808

jobs:
  release-plz-pr:
    name: Release-plz PR
    if: ${{ github.event_name == 'push' && github.repository_owner == 'opsydyn' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release-plz release-pr
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write PR workflow summary
        shell: bash
        env:
          PR: ${{ steps.release-plz.outputs.pr }}
          PRS: ${{ steps.release-plz.outputs.prs }}
        run: |
          set -euo pipefail
          {
            echo "## release-plz PR"
            echo
            if [[ -n "${PR:-}" && "${PR}" != "{}" ]]; then
              echo "- Release PR: ${PR}"
            elif [[ -n "${PRS:-}" && "${PRS}" != "[]" ]]; then
              echo "- Release PR payload: \`${PRS}\`"
            else
              echo "- No release PR was created or updated on this run."
              echo "- If this is unexpected, verify the repository Actions permissions in Settings → Actions → General and check whether this ref includes releasable changes."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-plz-release:
    name: Release-plz release
    if: ${{ github.event_name == 'push' && github.repository_owner == 'opsydyn' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      release_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run release gate tests
        run: cargo test --quiet --locked

      - name: Run release gate clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release workflow summary
        shell: bash
        env:
          RELEASES_CREATED: ${{ steps.release-plz.outputs.releases_created }}
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          {
            echo "## release-plz release"
            echo
            echo "- Releases created: \`${RELEASES_CREATED:-false}\`"
            if [[ "${RELEASES_CREATED:-false}" == "true" ]]; then
              echo "- Release payload: \`${RELEASES}\`"
            else
              echo "- No GitHub release was created from this ref, so asset packaging is skipped intentionally."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Capture release metadata
        id: meta
        if: steps.release-plz.outputs.releases_created == 'true'
        shell: bash
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          set -euo pipefail
          release_tag=$(python3 -c 'import json, os; print(json.loads(os.environ["RELEASES"])[0]["tag"])')
          echo "tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "Released ${release_tag}"

  build-release-assets:
    name: Build release assets (${{ matrix.label }})
    if: ${{ needs.release-plz-release.outputs.releases_created == 'true' }}
    needs: release-plz-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact_name: linux-x86_64.tar.gz
            bin_name: amp808
          - os: macos-latest
            label: macos
            artifact_name: macos-universal.tar.gz
            bin_name: amp808
          - os: windows-latest
            label: windows
            artifact_name: windows-x86_64.zip
            bin_name: amp808.exe

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout released tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-plz-release.outputs.release_tag }}

      - name: Install Linux audio dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release (macOS universal)
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Build release
        if: matrix.os != 'macos-latest'
        run: cargo build --release --locked

      - name: Package release (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-plz-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/${{ env.APP_NAME }}
          cp target/release/${{ matrix.bin_name }} dist/${{ env.APP_NAME }}/
          cp README.md dist/${{ env.APP_NAME }}/
          tar -C dist -czf dist/${{ env.APP_NAME }}-${RELEASE_TAG}-${{ matrix.artifact_name }} ${{ env.APP_NAME }}

      - name: Package release (macOS universal)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release-plz-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/${{ env.APP_NAME }}
          lipo -create \
            target/aarch64-apple-darwin/release/${{ matrix.bin_name }} \
            target/x86_64-apple-darwin/release/${{ matrix.bin_name }} \
            -output dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}
          cp README.md dist/${{ env.APP_NAME }}/
          tar -C dist -czf dist/${{ env.APP_NAME }}-${RELEASE_TAG}-${{ matrix.artifact_name }} ${{ env.APP_NAME }}

      - name: Verify universal binary
        if: matrix.os == 'macos-latest'
        run: lipo -info dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-plz-release.outputs.release_tag }}
        run: |
          New-Item -ItemType Directory -Path dist/${{ env.APP_NAME }} -Force | Out-Null
          Copy-Item target/release/${{ matrix.bin_name }} dist/${{ env.APP_NAME }}/${{ matrix.bin_name }}
          Copy-Item README.md dist/${{ env.APP_NAME }}/README.md
          Compress-Archive -Path dist/${{ env.APP_NAME }}/* -DestinationPath dist/${{ env.APP_NAME }}-$env:RELEASE_TAG-${{ matrix.artifact_name }} -Force

      - name: Upload asset to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-plz-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist/*-"$RELEASE_TAG"-${{ matrix.artifact_name }} --clobber --repo ${{ github.repository }}

  build-existing-release-assets:
    name: Build existing release assets (${{ matrix.label }})
    if: ${{ github.event_name == 'workflow_dispatch' && github.repository_owner == 'opsydyn' && github.event.inputs.release_tag != '' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact_name: linux-x86_64.tar.gz
            bin_name: amp808
          - os: macos-latest
            label: macos
            artifact_name: macos-universal.tar.gz
            bin_name: amp808
          - os: windows-latest
            label: windows
            artifact_name: windows-x86_64.zip
            bin_name: amp808.exe

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout requested tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag }}

      - name: Install Linux audio dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release (macOS universal)
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Build release
        if: matrix.os != 'macos-latest'
        run: cargo build --release --locked

      - name: Package release (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/${{ env.APP_NAME }}
          cp target/release/${{ matrix.bin_name }} dist/${{ env.APP_NAME }}/
          cp README.md dist/${{ env.APP_NAME }}/
          tar -C dist -czf dist/${{ env.APP_NAME }}-${RELEASE_TAG}-${{ matrix.artifact_name }} ${{ env.APP_NAME }}

      - name: Package release (macOS universal)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/${{ env.APP_NAME }}
          lipo -create \
            target/aarch64-apple-darwin/release/${{ matrix.bin_name }} \
            target/x86_64-apple-darwin/release/${{ matrix.bin_name }} \
            -output dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}
          cp README.md dist/${{ env.APP_NAME }}/
          tar -C dist -czf dist/${{ env.APP_NAME }}-${RELEASE_TAG}-${{ matrix.artifact_name }} ${{ env.APP_NAME }}

      - name: Verify universal binary
        if: matrix.os == 'macos-latest'
        run: lipo -info dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          New-Item -ItemType Directory -Path dist/${{ env.APP_NAME }} -Force | Out-Null
          Copy-Item target/release/${{ matrix.bin_name }} dist/${{ env.APP_NAME }}/${{ matrix.bin_name }}
          Copy-Item README.md dist/${{ env.APP_NAME }}/README.md
          Compress-Archive -Path dist/${{ env.APP_NAME }}/* -DestinationPath dist/${{ env.APP_NAME }}-$env:RELEASE_TAG-${{ matrix.artifact_name }} -Force

      - name: Upload asset to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" dist/*-"$RELEASE_TAG"-${{ matrix.artifact_name }} --clobber --repo ${{ github.repository }}
