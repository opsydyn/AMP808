<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link data-trunk rel="rust" href="Cargo.toml" />
    <title>AMP808 Web</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #090a08;
      }

      body {
        color: #eeeadc;
        display: flex;
        flex-direction: column;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        overflow: hidden;
      }

      #app {
        background:
          linear-gradient(180deg, rgba(240, 90, 40, 0.08), transparent 16%),
          #090a08;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
      }

      #amp808-controls {
        align-items: center;
        background: #151712;
        border: 3px solid #b83d1f;
        border-top-width: 4px;
        box-sizing: border-box;
        color: #eeeadc;
        display: flex;
        flex: 0 0 auto;
        flex-wrap: wrap;
        gap: 9px;
        padding: 10px 12px;
        width: 100%;
      }

      #amp808-controls button,
      #amp808-controls input[type="url"],
      .amp808-file,
      .amp808-motion {
        border: 2px solid #090a08;
        border-radius: 0;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.24),
          inset 0 -2px 0 rgba(0, 0, 0, 0.22),
          0 3px 0 #050505;
        font: inherit;
        font-weight: 800;
        min-height: 38px;
      }

      #amp808-controls button,
      .amp808-file,
      .amp808-motion {
        background: #b83d1f;
        color: #eeeadc;
        cursor: pointer;
        letter-spacing: 0;
        padding: 7px 12px;
        text-transform: uppercase;
      }

      .amp808-file {
        background: #eeeadc;
        color: #090a08;
      }

      .amp808-motion {
        align-items: center;
        background: #24251d;
        color: #eeeadc;
        display: inline-flex;
        gap: 7px;
        min-height: 38px;
      }

      .amp808-motion input {
        accent-color: #ffd400;
        height: 16px;
        margin: 0;
        width: 16px;
      }

      #amp808-toggle {
        background: #f05a28;
        color: #090a08;
      }

      #amp808-load-url {
        background: #ffd400;
        color: #090a08;
      }

      #amp808-controls button:disabled {
        background: #1d1f18;
        color: #9a9d85;
        cursor: not-allowed;
      }

      #amp808-controls input[type="url"] {
        background: #050505;
        box-sizing: border-box;
        color: #eeeadc;
        line-height: 1.25;
        font-weight: 400;
        min-width: 0;
        max-width: min(42vw, 420px);
        padding: 7px 9px;
        width: 320px;
      }

      #amp808-controls button:focus-visible,
      #amp808-controls input[type="url"]:focus-visible,
      .amp808-motion:focus-within {
        outline: 3px solid #ffd400;
        outline-offset: 2px;
      }

      @supports selector(:has(*)) {
        .amp808-file:has(+ #amp808-file:focus-visible) {
          outline: 3px solid #ffd400;
          outline-offset: 2px;
        }
      }

      #amp808-file {
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        height: 1px;
        margin: -1px;
        opacity: 0;
        overflow: hidden;
        position: absolute;
        white-space: nowrap;
        width: 1px;
      }

      #amp808-control-status {
        color: #eeeadc;
        font-size: 12px;
        font-weight: 700;
        max-width: min(52vw, 640px);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 760px) {
        #amp808-controls input[type="url"] {
          max-width: none;
          width: 100%;
        }

        #amp808-control-status {
          max-width: 100%;
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <section id="amp808-controls" aria-label="AMP808 web audio controls">
      <label class="amp808-file" for="amp808-file">Load audio</label>
      <input id="amp808-file" type="file" accept="audio/*" />
      <button id="amp808-seek-back" type="button" aria-label="Seek back 15 seconds">
        -15s
      </button>
      <button id="amp808-toggle" type="button" disabled>Play</button>
      <button id="amp808-seek-forward" type="button" aria-label="Seek forward 15 seconds">
        +15s
      </button>
      <input
        id="amp808-url"
        type="url"
        inputmode="url"
        placeholder="https://example.com/audio.mp3"
        autocomplete="off"
        list="amp808-recent-urls"
      />
      <datalist id="amp808-recent-urls"></datalist>
      <button id="amp808-load-url" type="button">Load URL</button>
      <label class="amp808-motion" for="amp808-motion">
        <input id="amp808-motion" type="checkbox" checked />
        Motion
      </label>
      <span id="amp808-control-status">No audio loaded</span>
    </section>
  </body>
</html>
