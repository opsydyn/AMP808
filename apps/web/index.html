<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link data-trunk rel="rust" href="Cargo.toml" />
    <title>AMP808 Web</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
      }

      body {
        color: #f7f0dc;
        display: flex;
        flex-direction: column;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        overflow: hidden;
      }

      #app {
        background: #000;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
      }

      #amp808-controls {
        align-items: center;
        background: rgba(0, 0, 0, 0.82);
        border: 1px solid #f6a623;
        box-sizing: border-box;
        display: flex;
        flex: 0 0 auto;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px;
        width: 100%;
      }

      #amp808-controls button,
      #amp808-controls input[type="url"],
      .amp808-file {
        background: #050505;
        border: 1px solid #4d4d4d;
        color: #f7f0dc;
        font: inherit;
        min-height: 30px;
      }

      #amp808-controls button,
      .amp808-file {
        cursor: pointer;
        padding: 5px 9px;
      }

      #amp808-controls button:disabled {
        color: #777;
        cursor: not-allowed;
      }

      #amp808-controls input[type="url"] {
        box-sizing: border-box;
        max-width: min(42vw, 420px);
        padding: 5px 7px;
        width: 320px;
      }

      #amp808-file {
        display: none;
      }

      #amp808-control-status {
        color: #c9c9c9;
        font-size: 12px;
        max-width: min(52vw, 640px);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 760px) {
        #amp808-controls input[type="url"] {
          max-width: none;
          width: 100%;
        }

        #amp808-control-status {
          max-width: 100%;
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <section id="amp808-controls" aria-label="AMP808 web audio controls">
      <label class="amp808-file" for="amp808-file">Load audio</label>
      <input id="amp808-file" type="file" accept="audio/*" />
      <button id="amp808-toggle" type="button" disabled>Play</button>
      <input
        id="amp808-url"
        type="url"
        inputmode="url"
        placeholder="https://example.com/audio.mp3"
        autocomplete="off"
      />
      <button id="amp808-load-url" type="button">Load URL</button>
      <span id="amp808-control-status">No audio loaded</span>
    </section>
  </body>
</html>
